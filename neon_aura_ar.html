<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Hand Tracking AR</title>
    
    <!-- MediaPipe Hands CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        :root {
            --bg-color: #050510;
            --text-color: #ffffff;
            --glass-bg: rgba(20, 25, 40, 0.4);
            --glass-border: rgba(255, 255, 255, 0.15);
            --glass-blur: blur(16px);
            --accent: #00ffcc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
        }

        .video-container {
            position: absolute;
            width: 100vw;
            height: 100vh;
        }

        .input_video {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            z-index: 0;
            filter: brightness(0.55) contrast(1.1);
        }

        #bgCanvas, #mainCanvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }

        #bgCanvas { z-index: 1; pointer-events: none; }
        #mainCanvas { z-index: 5; pointer-events: none; }

        #hud {
            position: absolute;
            top: 20px; left: 20px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 15px;
            pointer-events: none;
        }

        .panel {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 15px 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .stat {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: rgba(255,255,255,0.8);
            min-width: 180px;
            gap: 12px;
        }
        .stat:last-child { margin-bottom: 0; }
        .stat span.val { font-weight: bold; color: var(--accent); }

        #themes {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            gap: 10px;
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 8px;
        }

        .theme-btn {
            background: transparent;
            border: 1px solid transparent;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s ease;
            font-weight: 500;
        }
        .theme-btn.active {
            background: rgba(255,255,255,0.15);
            border-color: rgba(255,255,255,0.3);
            text-shadow: 0 0 10px white;
        }

        #startOverlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.88);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
            transition: opacity 0.6s ease;
        }

        #startOverlay h1 {
            font-size: 2.5rem;
            font-weight: 200;
            letter-spacing: 6px;
            margin-bottom: 16px;
            background: linear-gradient(90deg, #ff00cc, #00ffcc, #3333ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        #startOverlay p { margin-bottom: 40px; color: #888; text-align: center; max-width: 360px; }

        .start-btn {
            padding: 16px 40px;
            font-size: 1.1rem;
            background: linear-gradient(45deg, #ff00cc, #3333ff);
            border: none;
            color: white;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(255, 0, 204, 0.4);
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .start-btn:hover {
            transform: scale(1.06);
            box-shadow: 0 0 50px rgba(255, 0, 204, 0.7);
        }

        /* FIX: hidden should truly hide */
        .hidden {
            opacity: 0 !important;
            pointer-events: none !important;
            visibility: hidden !important;
        }

        #error-msg {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,50,50,0.2);
            border: 1px solid rgba(255,100,100,0.4);
            border-radius: 10px;
            padding: 10px 20px;
            color: #ff8888;
            font-size: 0.85rem;
            z-index: 20;
            display: none;
        }
    </style>
</head>
<body>

    <div id="startOverlay">
        <h1>NEON AURA AR</h1>
        <p>Grant camera permissions and click to start the audio/visual experience</p>
        <button class="start-btn" id="startBtn">✦ Enter Experience</button>
    </div>

    <div class="video-container">
        <video class="input_video" autoplay playsinline muted></video>
        <canvas id="bgCanvas"></canvas>
        <canvas id="mainCanvas"></canvas>
    </div>

    <div id="hud" class="hidden">
        <div class="panel">
            <div class="stat">Hands Detected <span class="val" id="ui-hands">0</span></div>
            <div class="stat">FPS <span class="val" id="ui-fps">0</span></div>
        </div>
        <div class="panel">
            <div class="stat">Gesture <span class="val" id="ui-gesture">None</span></div>
            <div class="stat">Spread <span class="val" id="ui-spread">0%</span></div>
        </div>
    </div>

    <div id="themes" class="hidden">
        <button class="theme-btn active" data-theme="Rainbow">Rainbow</button>
        <button class="theme-btn" data-theme="Cyberpunk">Cyberpunk</button>
        <button class="theme-btn" data-theme="Lava">Lava</button>
        <button class="theme-btn" data-theme="Ocean">Ocean</button>
        <button class="theme-btn" data-theme="Galaxy">Galaxy</button>
    </div>

    <div id="error-msg"></div>

<script>
'use strict';

// ─── HAND_CONNECTIONS (MediaPipe standard, manually defined for reliability) ───
const HAND_CONNECTIONS = [
    [0,1],[1,2],[2,3],[3,4],         // Thumb
    [0,5],[5,6],[6,7],[7,8],         // Index
    [0,9],[9,10],[10,11],[11,12],    // Middle
    [0,13],[13,14],[14,15],[15,16],  // Ring
    [0,17],[17,18],[18,19],[19,20],  // Pinky
    [5,9],[9,13],[13,17]             // Palm
];

// ─── GLOBALS ───────────────────────────────────────────────────────────────────
const videoElement = document.querySelector('.input_video');
const bgCanvas     = document.getElementById('bgCanvas');
const mainCanvas   = document.getElementById('mainCanvas');
const bgCtx        = bgCanvas.getContext('2d');
const ctx          = mainCanvas.getContext('2d');

let width, height;
let time = 0;
let lastTime = performance.now();
let framesThisSecond = 0, lastFpsTime = performance.now();

let currentHands  = [];
let handVelocities = 0;

let currentTheme = 'Rainbow';
const themes = {
    'Rainbow':   (t, i, total) => `hsl(${(t * 80 + i * (360 / Math.max(total,1))) % 360}, 100%, 60%)`,
    'Cyberpunk': (t, i)        => (i % 2 === 0) ? '#ff003c' : '#00f0ff',
    'Lava':      (t, i)        => `hsl(${(10 + i * 8) % 40}, 100%, ${50 + Math.sin(t + i) * 10}%)`,
    'Ocean':     (t, i)        => `hsl(${185 + i * 15}, 100%, 60%)`,
    'Galaxy':    (t, i)        => `hsl(${260 + Math.sin(t * 1.5 + i) * 50}, 100%, 65%)`
};

let particles = [];
let ripples   = [];
const FINGER_TIPS = [4, 8, 12, 16, 20];

// Matrix rain
let matrixColumns = [];
const fontSize = 16;
let maxColumns = 0;

// Audio
let audioCtx = null, humOsc = null, humGain = null;

// UI refs
const uiHands   = document.getElementById('ui-hands');
const uiFps     = document.getElementById('ui-fps');
const uiGesture = document.getElementById('ui-gesture');
const uiSpread  = document.getElementById('ui-spread');
const errMsg    = document.getElementById('error-msg');

let lastPinchState = [false, false];

// ─── RESIZE ────────────────────────────────────────────────────────────────────
function resize() {
    width  = window.innerWidth;
    height = window.innerHeight;
    bgCanvas.width   = width;  bgCanvas.height   = height;
    mainCanvas.width = width;  mainCanvas.height = height;
    maxColumns    = Math.floor(width / fontSize);
    matrixColumns = Array.from({length: maxColumns}, () => Math.random() * height / fontSize);
}
window.addEventListener('resize', resize);
resize();

// ─── THEME SWITCHER ────────────────────────────────────────────────────────────
document.querySelectorAll('.theme-btn').forEach(btn => {
    btn.addEventListener('click', e => {
        document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        currentTheme = e.target.dataset.theme;
    });
});

// ─── START BUTTON ──────────────────────────────────────────────────────────────
document.getElementById('startBtn').addEventListener('click', async () => {
    try {
        await navigator.mediaDevices.getUserMedia({ video: true });
    } catch(e) {
        showError('Camera permission denied. Please allow camera access and refresh.');
        return;
    }
    document.getElementById('startOverlay').classList.add('hidden');
    document.getElementById('hud').classList.remove('hidden');
    document.getElementById('themes').classList.remove('hidden');
    initAudio();
    initMediaPipe();
    requestAnimationFrame(renderLoop);
});

function showError(msg) {
    errMsg.style.display = 'block';
    errMsg.textContent   = msg;
}

// ─── AUDIO ─────────────────────────────────────────────────────────────────────
function initAudio() {
    try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        humOsc   = audioCtx.createOscillator();
        humGain  = audioCtx.createGain();
        humOsc.type           = 'sine';
        humOsc.frequency.value = 100;
        humGain.gain.value    = 0;
        humOsc.connect(humGain);
        humGain.connect(audioCtx.destination);
        humOsc.start();
    } catch(e) { console.warn('Web Audio unavailable', e); }
}

function triggerZap() {
    if (!audioCtx) return;
    const osc  = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(800, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.12);
    gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.15);
}

function updateHum(hands) {
    if (!audioCtx || !humGain) return;
    if (hands.length < 2) {
        humGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
        return;
    }
    const p1 = hands[0][8], p2 = hands[1][8];
    const dist = Math.hypot(p1.x - p2.x, p1.y - p2.y);
    humOsc.frequency.setTargetAtTime(100 + (1 - Math.min(dist, 1)) * 300, audioCtx.currentTime, 0.1);
    humGain.gain.setTargetAtTime(0.05 + (1 - Math.min(dist, 1)) * 0.15, audioCtx.currentTime, 0.1);
}

// ─── HELPERS ───────────────────────────────────────────────────────────────────
function getDist(p1, p2) {
    return Math.hypot(p1.x - p2.x, p1.y - p2.y);
}

// FIX: mirror X coordinate to match video scaleX(-1)
function mapToCanvas(pt) {
    return { x: (1 - pt.x) * width, y: pt.y * height };
}

// ─── GESTURES ──────────────────────────────────────────────────────────────────
function detectGestures() {
    if (!currentHands.length) return;

    currentHands.forEach((hand, idx) => {
        const thumb = hand[4], index = hand[8];
        const dist  = getDist(thumb, index);
        const isPinching = dist < 0.055;

        if (isPinching && !lastPinchState[idx]) {
            const mid = { x: (thumb.x + index.x) / 2, y: (thumb.y + index.y) / 2 };
            createShockwave(mapToCanvas(mid), themes[currentTheme](time, 1, 1));
            triggerZap();
            uiGesture.innerText = '⚡ PINCH!';
        }
        lastPinchState[idx] = isPinching;
    });

    if (currentHands[0]) {
        const spread    = getDist(currentHands[0][8], currentHands[0][20]);
        const spreadPct = Math.min(Math.round(spread * 300), 100);
        uiSpread.innerText = spreadPct + '%';
        if (!lastPinchState.includes(true)) {
            uiGesture.innerText = spreadPct > 50 ? '✋ Open Hand' : '✊ Fist';
        }
    }
}

// ─── PHYSICS ───────────────────────────────────────────────────────────────────
function createParticles(pos, color, count = 2) {
    for (let i = 0; i < count; i++) {
        particles.push({
            x: pos.x, y: pos.y,
            vx: (Math.random() - 0.5) * 8,
            vy: (Math.random() - 0.5) * 8,
            life: 1.0,
            color,
            size: Math.random() * 3 + 1
        });
    }
}

function createShockwave(pos, color) {
    ripples.push({
        x: pos.x, y: pos.y,
        radius: 0,
        maxRadius: 150 + Math.random() * 120,
        life: 1.0,
        color
    });
}

// ─── BACKGROUND ────────────────────────────────────────────────────────────────
function drawBackground() {
    bgCtx.globalCompositeOperation = 'destination-out';
    bgCtx.fillStyle = `rgba(0,0,0,${0.12 + Math.min(handVelocities * 8, 0.45)})`;
    bgCtx.fillRect(0, 0, width, height);
    bgCtx.globalCompositeOperation = 'source-over';

    bgCtx.fillStyle = themes[currentTheme](time, 1, 1);
    bgCtx.font      = fontSize + 'px monospace';

    const speedMult = 1 + handVelocities * 80;

    for (let i = 0; i < matrixColumns.length; i++) {
        if (Math.random() > 0.96) {
            const char = String.fromCharCode(0x30A0 + Math.random() * 96);
            bgCtx.fillText(char, i * fontSize, matrixColumns[i] * fontSize);
        }
        matrixColumns[i] += Math.random() * speedMult;
        if (matrixColumns[i] * fontSize > height && Math.random() > 0.9) {
            matrixColumns[i] = 0;
        }
    }
}

// ─── PHYSICS DRAW ──────────────────────────────────────────────────────────────
function updatePhysics() {
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x  += p.vx;
        p.y  += p.vy;
        p.vy += 0.1;
        p.life -= 0.022;
        if (p.life <= 0) { particles.splice(i, 1); continue; }
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle   = p.color;
        ctx.globalAlpha = p.life;
        ctx.fill();
    }

    for (let i = ripples.length - 1; i >= 0; i--) {
        const r = ripples[i];
        r.radius += (r.maxRadius - r.radius) * 0.1;
        r.life   -= 0.025;
        if (r.life <= 0) { ripples.splice(i, 1); continue; }
        ctx.beginPath();
        ctx.arc(r.x, r.y, r.radius, 0, Math.PI * 2);
        ctx.strokeStyle = r.color;
        ctx.lineWidth   = 4 * r.life;
        ctx.globalAlpha = r.life;
        ctx.stroke();
    }
    ctx.globalAlpha = 1.0;
}

// ─── DRAW SKELETON ─────────────────────────────────────────────────────────────
function drawHandSkeleton(hand, glowColor) {
    // Connections
    ctx.shadowBlur  = 12;
    ctx.shadowColor = glowColor;
    ctx.strokeStyle = glowColor;
    ctx.lineWidth   = 2.5;

    HAND_CONNECTIONS.forEach(([a, b]) => {
        const pa = mapToCanvas(hand[a]);
        const pb = mapToCanvas(hand[b]);
        ctx.beginPath();
        ctx.moveTo(pa.x, pa.y);
        ctx.lineTo(pb.x, pb.y);
        ctx.stroke();
    });

    // All landmarks — small dots
    hand.forEach((pt, idx) => {
        const p = mapToCanvas(pt);
        ctx.beginPath();
        ctx.arc(p.x, p.y, FINGER_TIPS.includes(idx) ? 5 : 3, 0, Math.PI * 2);
        ctx.fillStyle   = FINGER_TIPS.includes(idx) ? '#ffffff' : glowColor;
        ctx.globalAlpha = 0.9;
        ctx.fill();
    });

    ctx.shadowBlur  = 0;
    ctx.globalAlpha = 1.0;

    // Fingertip particles
    FINGER_TIPS.forEach((tipIdx, i) => {
        const pt  = mapToCanvas(hand[tipIdx]);
        const col = themes[currentTheme](time, i, FINGER_TIPS.length);
        if (Math.random() > 0.55) createParticles(pt, col, 1);
    });
}

// ─── RENDER LOOP ───────────────────────────────────────────────────────────────
function renderLoop(timestamp) {
    requestAnimationFrame(renderLoop);

    const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
    lastTime  = timestamp;
    time     += dt;

    framesThisSecond++;
    if (timestamp > lastFpsTime + 1000) {
        uiFps.innerText    = framesThisSecond;
        framesThisSecond   = 0;
        lastFpsTime        = timestamp;
    }

    drawBackground();

    // Fade main canvas (motion blur trail)
    ctx.globalCompositeOperation = 'destination-out';
    ctx.fillStyle = 'rgba(0,0,0,0.18)';
    ctx.fillRect(0, 0, width, height);

    ctx.globalCompositeOperation = 'screen';

    updatePhysics();

    if (currentHands.length > 0) {
        // Draw each hand
        currentHands.forEach((hand, hi) => {
            const glowColor = themes[currentTheme](time, hi, 2);
            drawHandSkeleton(hand, glowColor);
        });

        // Cross-hand lightning + connecting lines
        if (currentHands.length >= 2) {
            const h1 = currentHands[0];
            const h2 = currentHands[1];

            FINGER_TIPS.forEach((tipIdx, i) => {
                const pt1  = mapToCanvas(h1[tipIdx]);
                const pt2  = mapToCanvas(h2[tipIdx]);
                const dist = getDist(pt1, pt2);
                const col  = themes[currentTheme](time, i, FINGER_TIPS.length);

                // Lightning arc when close
                if (dist < 160 && Math.random() > 0.4) {
                    const midX = (pt1.x + pt2.x) / 2 + (Math.random() - 0.5) * 60;
                    const midY = (pt1.y + pt2.y) / 2 + (Math.random() - 0.5) * 60;
                    ctx.beginPath();
                    ctx.moveTo(pt1.x, pt1.y);
                    ctx.lineTo(midX, midY);
                    ctx.lineTo(pt2.x, pt2.y);
                    ctx.strokeStyle = '#ffffff';
                    ctx.shadowBlur  = 25;
                    ctx.shadowColor = col;
                    ctx.lineWidth   = 2.5;
                    ctx.stroke();
                    ctx.shadowBlur  = 0;
                }

                // Gradient connector line
                const grad = ctx.createLinearGradient(pt1.x, pt1.y, pt2.x, pt2.y);
                grad.addColorStop(0,   themes[currentTheme](time, i,     5));
                grad.addColorStop(0.5, themes[currentTheme](time, i + 1, 5));
                grad.addColorStop(1,   themes[currentTheme](time, i + 2, 5));
                ctx.beginPath();
                ctx.moveTo(pt1.x, pt1.y);
                ctx.lineTo(pt2.x, pt2.y);
                ctx.strokeStyle = grad;
                ctx.lineWidth   = 3;
                ctx.shadowBlur  = 8;
                ctx.shadowColor = col;
                ctx.stroke();
                ctx.shadowBlur  = 0;
            });

            // Mandala between hands
            const allTips = [
                ...FINGER_TIPS.map(t => mapToCanvas(h1[t])),
                ...FINGER_TIPS.map(t => mapToCanvas(h2[t]))
            ];
            const cx = allTips.reduce((s, p) => s + p.x, 0) / allTips.length;
            const cy = allTips.reduce((s, p) => s + p.y, 0) / allTips.length;
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(time * 0.4);
            ctx.beginPath();
            for (let i = 0; i < 10; i++) {
                const t1 = { x: allTips[i].x - cx, y: allTips[i].y - cy };
                const t2 = { x: allTips[(i + 3) % 10].x - cx, y: allTips[(i + 3) % 10].y - cy };
                ctx.moveTo(t1.x, t1.y);
                ctx.lineTo(t2.x, t2.y);
            }
            ctx.strokeStyle = 'rgba(255,255,255,0.25)';
            ctx.lineWidth   = 1;
            ctx.stroke();
            ctx.restore();
        }

        detectGestures();
    } else {
        uiGesture.innerText = 'None';
        uiSpread.innerText  = '0%';
    }

    ctx.globalCompositeOperation = 'source-over';
}

// ─── MEDIAPIPE ─────────────────────────────────────────────────────────────────
function initMediaPipe() {
    const hands = new Hands({
        locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
        maxNumHands:            2,
        modelComplexity:        1,
        minDetectionConfidence: 0.65,
        minTrackingConfidence:  0.65
    });

    hands.onResults(results => {
        uiHands.innerText = results.multiHandLandmarks ? results.multiHandLandmarks.length : 0;

        // Velocity
        if (currentHands.length > 0 && results.multiHandLandmarks?.length > 0) {
            const oldP = currentHands[0][8];
            const newP = results.multiHandLandmarks[0][8];
            if (oldP && newP) handVelocities = getDist(oldP, newP);
        } else {
            handVelocities = 0;
        }

        currentHands = results.multiHandLandmarks || [];
        updateHum(currentHands);
    });

    hands.onError = err => showError('MediaPipe error: ' + err);

    const camera = new Camera(videoElement, {
        onFrame: async () => { await hands.send({ image: videoElement }); },
        width:  1280,
        height:  720,
        facingMode: 'user'
    });

    camera.start().catch(e => showError('Camera failed: ' + e.message));
}
</script>
</body>
</html>
